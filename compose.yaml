# Docker Compose for Backend Local Development
# Includes PostgreSQL database for local development
services:
  exam-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4455}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    ports:
      - "4455:4455"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - exam-network
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: samuelze
      POSTGRES_DB: exam
    ports:
      - "5436:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam-network

networks:
  exam-network:
    driver: bridge
